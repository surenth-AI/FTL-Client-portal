{% extends "base.html" %}

{% block title %}My Quotes{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="mb-0 fw-bold">My Quotes</h3>
    <a href="{{ url_for('customer.rates') }}" class="btn btn-primary shadow-sm rounded-pill px-4 py-2">
        <i class="bi bi-plus-lg me-2"></i> New Quote
    </a>
</div>

<div class="glass-card p-5 text-center">
    <i class="bi bi-inbox fs-1 text-muted mb-3 d-block"></i>
    <h5 class="text-secondary fw-semibold">No quotes found</h5>
    <p class="text-muted mb-4">You have not requested any quotes yet.</p>
</div>
{% endblock %}
