{% extends "base.html" %}
{% block title %}Live Tracking{% endblock %}
{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col-md-8">
        <h2 class="text-white fw-bold mb-0">Freight Tracker Matrix</h2>
        <p class="text-muted mb-0">Initiate deep terminal reconnaissance.</p>
    </div>
</div>

<div class="card glass-card p-5 text-center" style="max-width: 800px; margin: 0 auto;">
    <div class="mb-4">
        <div class="d-inline-flex align-items-center justify-content-center bg-accent-light p-4 rounded-circle mb-3">
            <i class="bi bi-geo-alt fs-1 text-accent"></i>
        </div>
        <h4 class="text-white fw-bold">Live Target Locator</h4>
    </div>

    <form method="POST" action="{{ url_for('tracking.index') }}" id="trackingForm">
        <div class="input-group input-group-lg mb-4" style="border: 1px solid rgba(255,255,255,0.1); border-radius: 0.5rem; overflow: hidden;">
            <input type="text" name="container_no" class="form-control bg-dark text-white border-0" placeholder="Enter Container Number (e.g. CRLU1206147)" required>
            <button class="btn btn-primary px-4 fw-bold" type="submit" id="trackBtn">Locate</button>
        </div>
        <div id="loader" style="display:none;" class="mt-3">
            <div class="spinner-border text-primary me-2" role="status"></div>
            <span class="text-white fw-bold">Establishing Terminal Bridge...</span>
        </div>
    </form>
</div>
<script>
    document.getElementById('trackingForm').onsubmit = function() {
        document.getElementById('trackBtn').disabled = true;
        document.getElementById('loader').style.display = 'block';
    }
</script>
{% endblock %}
