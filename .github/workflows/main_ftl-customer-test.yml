# Combined robust deployment for Azure Web App - FTL-customer-test
# Merges Container-based compilation (GLIBC compatibility) with Azure OIDC Federated Login

name: Build and deploy Python app to Azure Web App - FTL-customer-test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/devcontainers/python:3.11-bullseye
      options: --user root
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          rm -f /etc/apt/sources.list.d/yarn.list
          apt-get update
          apt-get install -y libcairo2-dev pkg-config
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --target="./.python_packages/lib/site-packages" --prefer-binary -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # Required for requesting the JWT
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B128CFCABD334A398C8D9477B0649EBD }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_88A86EE5D15E4EF18D79812693AAD45B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B3A58AC24DF8447BB007F69E848FE828 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'FTL-customer-test'
          slot-name: 'Production'